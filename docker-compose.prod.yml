# -----------------------------------------------------------------------------
# Nacos：容器名 novel-nacos-server（如 nacos/nacos-server:v2.2.1）
#   宿主机映射：52582 -> 容器 8848（HTTP/API），53582 -> 容器 9848（2.x gRPC）
# 业务容器与 Nacos 必须在同一 Docker 网络；容器内请使用 novel-nacos-server:8848，
# 不要使用宿主机 52582（其它容器访问不到宿主机映射端口语义）。
# Java 客户端对 2.x 默认按「主端口 + 1000」推导 gRPC：52582 -> 53582，与上述映射一致。
# -----------------------------------------------------------------------------
version: '3.8'

x-nacos-client-env: &nacos-client-env
  SPRING_PROFILES_ACTIVE: prod
  NACOS_SERVER_ADDR: novel-nacos-server:8848
  NACOS_NAMESPACE_ID: prod_namespace
  TZ: Asia/Shanghai

services:
  # 网关服务
  novel-gateway:
    image: novel-gateway:latest
    container_name: novel-gateway
    restart: always
    ports:
      - "8080:8888"
    # 使用 entrypoint 强制注入探针参数
    entrypoint: [
      "java",
      "-javaagent:/skywalking/agent/skywalking-agent.jar",
      "-Dskywalking.agent.service_name=novel-gateway",
      "-Dskywalking.collector.backend_service=10.2.24.4:11800",
      "-Xms512m", "-Xmx512m",
      "-jar", "app.jar"
    ]
    environment:
      <<: *nacos-client-env
    volumes:
      - /home/ubuntu/dependence/skywalking-agent:/skywalking/agent
    networks:
      - common-network

  # 用户服务
  novel-user-service:
    image: novel-user-service:latest
    container_name: novel-user-service
    restart: always
    entrypoint: [
      "java",
      "-javaagent:/skywalking/agent/skywalking-agent.jar",
      "-Dskywalking.agent.service_name=novel-user-service",
      "-Dskywalking.collector.backend_service=10.2.24.4:11800",
      "-jar", "app.jar"
    ]
    environment:
      <<: *nacos-client-env
    volumes:
      - /home/ubuntu/dependence/skywalking-agent:/skywalking/agent
    networks:
      - common-network

  # 书籍服务
  novel-book-service:
    image: novel-book-service:latest
    container_name: novel-book-service
    restart: always
    entrypoint: [
      "java",
      "-javaagent:/skywalking/agent/skywalking-agent.jar",
      "-Dskywalking.agent.service_name=novel-book-service",
      "-Dskywalking.collector.backend_service=10.2.24.4:11800",
      "-jar", "app.jar"
    ]
    environment:
      <<: *nacos-client-env
    volumes:
      - /home/ubuntu/dependence/skywalking-agent:/skywalking/agent
    networks:
      - common-network

  # 搜索服务
  novel-search-service:
    image: novel-search-service:latest
    container_name: novel-search-service
    restart: always
    entrypoint: [
      "java",
      "-javaagent:/skywalking/agent/skywalking-agent.jar",
      "-Dskywalking.agent.service_name=novel-search-service",
      "-Dskywalking.collector.backend_service=10.2.24.4:11800",
      "-jar", "app.jar"
    ]
    environment:
      <<: *nacos-client-env
    volumes:
      - /home/ubuntu/dependence/skywalking-agent:/skywalking/agent
    networks:
      - common-network

  # AI服务
  novel-ai-service:
    image: novel-ai-service:latest
    container_name: novel-ai-service
    restart: always
    entrypoint: [
      "java",
      "-javaagent:/skywalking/agent/skywalking-agent.jar",
      "-Dskywalking.agent.service_name=novel-ai-service",
      "-Dskywalking.collector.backend_service=10.2.24.4:11800",
      "-jar", "app.jar"
    ]
    environment:
      <<: *nacos-client-env
    volumes:
      - /home/ubuntu/dependence/skywalking-agent:/skywalking/agent
    networks:
      - common-network

  front:
    image: turtle-website-front:latest
    container_name: turtle-website-front
    ports:
      - "1024:80"
    restart: always
    networks:
      - common-network

networks:
  common-network:
    external: true
