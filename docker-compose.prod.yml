version: '3.8'

services:
  # 网关服务
  novel-gateway:
    image: novel-gateway:latest
    container_name: novel-gateway
    restart: always
    ports:
      - "8080:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=novel-nacos-server:8848
      - TZ=Asia/Shanghai
      # --- 新增 SkyWalking 配置 ---
      - SW_AGENT_NAME=novel-gateway
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=10.2.24.4:11800
      - JAVA_OPTS=-javaagent:/skywalking/agent/skywalking-agent.jar
    volumes:
      - /home/ubuntu/dependence/skywalking-agent:/skywalking/agent # 将宿主机探针目录挂载到容器
    networks:
      - common-network

  # 用户服务
  novel-user-service:
    image: novel-user-service:latest
    container_name: novel-user-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=novel-nacos-server:8848
      - TZ=Asia/Shanghai
      # --- 新增 SkyWalking 配置 ---
      - SW_AGENT_NAME=novel-user-service
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=10.2.24.4:11800
      - JAVA_OPTS=-javaagent:/skywalking/agent/skywalking-agent.jar
    volumes:
      - /home/ubuntu/dependence/skywalking-agent:/skywalking/agent # 将宿主机探针目录挂载到容器
    networks:
      - common-network

  # 书籍服务
  novel-book-service:
    image: novel-book-service:latest
    container_name: novel-book-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=novel-nacos-server:8848
      - TZ=Asia/Shanghai
      # --- 新增 SkyWalking 配置 ---
      - SW_AGENT_NAME=novel-book-service
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=10.2.24.4:11800
      - JAVA_OPTS=-javaagent:/skywalking/agent/skywalking-agent.jar
    volumes:
      - /home/ubuntu/dependence/skywalking-agent:/skywalking/agent # 将宿主机探针目录挂载到容器
    networks:
      - common-network

  # 搜索服务
  novel-search-service:
    image: novel-search-service:latest
    container_name: novel-search-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=novel-nacos-server:8848
      - TZ=Asia/Shanghai
      # --- 新增 SkyWalking 配置 ---
      - SW_AGENT_NAME=novel-search-service
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=10.2.24.4:11800
      - JAVA_OPTS=-javaagent:/skywalking/agent/skywalking-agent.jar
    volumes:
      - /home/ubuntu/dependence/skywalking-agent:/skywalking/agent # 将宿主机探针目录挂载到容器
    networks:
      - common-network

  # AI服务
  novel-ai-service:
    image: novel-ai-service:latest
    container_name: novel-ai-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=novel-nacos-server:8848
      - TZ=Asia/Shanghai
      # --- 新增 SkyWalking 配置 ---
      - SW_AGENT_NAME=novel-ai-service
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=10.2.24.4:11800
      - JAVA_OPTS=-javaagent:/skywalking/agent/skywalking-agent.jar
    volumes:
      - /home/ubuntu/dependence/skywalking-agent:/skywalking/agent # 将宿主机探针目录挂载到容器
    networks:
      - common-network

  front:
    image: turtle-website-front:latest
    container_name: turtle-website-front
    ports:
      - "1024:80"
    restart: always
    networks:
      - common-network

# 外部网络配置
networks:
  common-network:
    external: true